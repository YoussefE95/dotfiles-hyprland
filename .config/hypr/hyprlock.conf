general {
    disable_loading_bar=true,
    hide_cursor=true
}

background {
    monitor =
    path = screenshot

    blur_passes = 1
    blur_size = 6
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 5
    dots_size = 0.28
    outer_color = rgb(303446)
    inner_color = rgb(292c3c)
    font_color = rgb(c6d0f5)
    check_color = rgb(e5c890)
    fail_color = rgb(e78284)

    position = 0, -20
    halign = center
    valign = center
}
