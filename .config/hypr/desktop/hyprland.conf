#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, W, exec, $web
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, T, exec, $terminal_float
bind = $mainMod, P, exec, $terminal_float -o font_size=20 theme-setter
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $launcher
bind = $mainMod, ESCAPE, exec, $lock
bind = $mainMod, Print, exec, $screenshot

bind = $mainMod, C, centerwindow
bind = $mainMod, F, fullscreen
bind = $mainMod, V, exec, $float_script --toggle
bind = $mainMod SHIFT, V, exec, $float_script --focus
bind = $mainMod SHIFT, Q, killactive

bind = $mainMod, h, movefocus, l
bind = $mainMod, h, alterzorder, top
bind = $mainMod, l, movefocus, r
bind = $mainMod, l, alterzorder, top
bind = $mainMod, k, movefocus, u
bind = $mainMod, k, alterzorder, top
bind = $mainMod, j, movefocus, d
bind = $mainMod, j, alterzorder, top

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod CTRL, h, resizeactive, -30 0
bind = $mainMod CTRL, l, resizeactive, 30 0
bind = $mainMod CTRL, k, resizeactive, 0 -30
bind = $mainMod CTRL, j, resizeactive, 0 30

bind = $mainMod, R, layoutmsg, colresize +conf
bind = $mainMod SHIFT, R, layoutmsg, colresize -conf
bind = $mainMod ALT, H, layoutmsg, swapcol l
bind = $mainMod ALT, L, layoutmsg, swapcol r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# Scroll through current workspace's windows with mainMod + scroll 
bind = $mainMod, mouse_up, cyclenext, prev tiled # movefocus, l
bind = $mainMod, mouse_down, cyclenext, next tiled # movefocus, r

# Scroll through existing workspaces with mainMod + SHIFT + scroll
bind = $mainMod SHIFT, mouse_down, workspace, e+1
bind = $mainMod SHIFT, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, amixer -Mq set Master,0 5%+ unmute
bindel = ,XF86AudioLowerVolume, exec, amixer -Mq set Master,0 5%- unmute
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = polkit-rules
    match:class = .*hyprland-share-picker.*

    float = on
    center = on
}

windowrule {
    name = dolphin-rules
    match:class = .*olphin.*

    float = on
    center = on
    size = 918 580
}

windowrule {
    name = pavu-rules
    match:class = .*pavucontrol.* 

    float = on
    center = on
    size = 840 540
}

windowrule {
    name = kitty-rules
    match:title = .*kitty_float.*

    float = on
    center = on
    size = 900 650
}

windowrule {
    name = steam
    match:class = steam

    float = on
}

windowrule {
    name = steam-main
    match:class = steam
    match:title = Steam

    center = on
    size = 1500 1000
}

windowrule {
    name = steam-friends
    match:class = steam
    match:title = .*Friends List.*

    size = 360 800
    move = 2070 286
}

windowrule {
    name = steam-proton
    match:class = .*steam_app_.*

    float = on
    center = on
}

workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-2
