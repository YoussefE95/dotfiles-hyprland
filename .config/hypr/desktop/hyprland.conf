################
### MONITORS ###
################

monitor=DP-3,2560x1440@144,0x0,1
monitor=DP-2,2560x1440@144,-2560x0,1

###################
### MY PROGRAMS ###
###################

$web = firefox
$terminal = kitty
$terminal_float = kitty --title kitty_float
$fileManager = dolphin
$launcher = qs ipc call popupLoader loadLauncher
$lock = hyprlock
$screenshot = hyprshot -s -m region -o ~/Screenshots
$float_script = ~/.config/hypr/scripts/float.sh

#################
### AUTOSTART ###
#################

exec-once = systemctl --user enable --now hyprpolkitagent.service
exec-once = hyprctl setcursor $(get-theme --cursors) 22
exec-once = swww-daemon
exec-once = qs

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,22
env = HYPRCURSOR_SIZE,22
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_STYLE_OVERRIDE,kvantum
env = XDG_MENU_PREFIX,arch-

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 4

    col.active_border = rgba(7daea3ee) rgba(89b482ee) 45deg
    col.inactive_border = rgba(7c6f64aa)

    resize_on_border = false

    allow_tearing = false

    layout = scrolling
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = .90
    inactive_opacity = .90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3

        noise = 0.025
        contrast = 1.25
        brightness = 0.90
        vibrancy = 0.65
    }
}

animations {
    enabled = yes

    animation = workspaces, 1, 4, default, slidevert
    animation = workspacesIn, 1, 4, default, slidevert
    animation = workspacesOut, 1, 4, default, slidevert
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

###############
### LAYOUTS ###
###############

master {
    mfact = .63
    new_status = slave
}

scrolling {
    fullscreen_on_one_column = false
    column_width = 0.3327 
    explicit_column_widths = 0.3327, 0.459, 0.5
}

###############
### PLUGINS ###
###############

